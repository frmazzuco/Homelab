services:
  grafana:
    image: grafana/grafana:12.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
    networks:
      - datalake

  duckdb-api:
    build:
      context: .
      dockerfile: Dockerfile.duckdb-api
    container_name: duckdb-api
    restart: unless-stopped
    ports:
      - "8089:8089"
    volumes:
      - ${DATALAKE_PATH:-/Users/franciscomazzucofilho/datalake}:/data
      - ./scripts:/app/scripts:ro
    environment:
      - DUCKDB_PATH=/data/datalake.duckdb
      - API_PORT=8089
    networks:
      - datalake

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: datalake-scheduler
    restart: unless-stopped
    volumes:
      - ${DATALAKE_PATH:-/Users/franciscomazzucofilho/datalake}:/data
      - ./scripts:/app/scripts:ro
    environment:
      - DUCKDB_PATH=/data/datalake.duckdb
      # Apprise
      - APPRISE_URL=http://apprise-api:8000
      - APPRISE_NOTIFY_URLS=${APPRISE_NOTIFY_URLS:-}
      - NOTIFY_ON_SUCCESS=${NOTIFY_ON_SUCCESS:-false}
      # Ingest secrets
      - PLUGGY_CLIENT_ID=${PLUGGY_CLIENT_ID:-}
      - PLUGGY_CLIENT_SECRET=${PLUGGY_CLIENT_SECRET:-}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - JELLYFIN_URL=${JELLYFIN_URL:-http://host.lima.internal:8096}
      - GWM_EMAIL=${GWM_EMAIL:-}
      - GWM_PASSWORD=${GWM_PASSWORD:-}
    networks:
      - datalake
      - default

volumes:
  grafana-data:

networks:
  datalake:
    name: datalake
  default:
    name: bridge
    external: true
